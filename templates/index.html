<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Model Prediction</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            /* Eye-catching modern gradient */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 40px;
        }
        .form-control {
            border-radius: 10px;
            border: 1px solid #ced4da;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(118, 75, 162, 0.25);
            border-color: #764ba2;
        }
        .btn-custom {
            background: #764ba2;
            color: white;
            border-radius: 50px;
            padding: 12px 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
        }
        .btn-custom:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .result-box {
            background: #e9ecef;
            border-left: 5px solid #764ba2;
            padding: 15px;
            border-radius: 5px;
            margin-top: 25px;
            font-size: 1.2rem;
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="glass-card">
                <h2 class="text-center mb-4" style="color: #4a4a4a; font-weight: bold;">Make a Prediction</h2>
                
                <form action="/predict" method="POST">
                    
                    <div class="mb-3">
                        <label for="Age" class="form-label text-muted fw-bold">Age</label>
                        <input type="number" step="any" class="form-control" name="Age" id="Age" placeholder="Enter Age" required>
                    </div>

                    <div class="mb-3">
                        <label for="Gender" class="form-label text-muted fw-bold">Gender (Encoded)</label>
                        <input type="number" step="any" class="form-control" name="Gender" id="Gender" placeholder="e.g., 0 for Male, 1 for Female" required>
                    </div>

                    <div class="mb-3">
                        <label for="Region" class="form-label text-muted fw-bold">Region (Encoded)</label>
                        <input type="number" step="any" class="form-control" name="Region" id="Region" placeholder="Enter encoded region value" required>
                    </div>

                    <div class="mb-3">
                        <label for="Occupation" class="form-label text-muted fw-bold">Occupation (Encoded)</label>
                        <input type="number" step="any" class="form-control" name="Occupation" id="Occupation" placeholder="Enter encoded occupation value" required>
                    </div>

                    <div class="mb-4">
                        <label for="Income" class="form-label text-muted fw-bold">Income</label>
                        <input type="number" step="any" class="form-control" name="Income" id="Income" placeholder="Enter Income amount" required>
                    </div>

                    <button type="submit" class="btn btn-custom">Predict Now</button>
                </form>

                {% if prediction_text %}
                    <div class="result-box fw-bold">
                        {{ prediction_text }}
                    </div>
                {% endif %}

            </div>
        </div>
    </div>
</div>

</body>
</html>
